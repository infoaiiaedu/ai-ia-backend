# Development Environment Configuration
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: ai-ia-backend:dev
    container_name: ai_ia_app_dev
    restart: unless-stopped
    command: >
      /bin/sh -c "
      set -e &&
      echo 'Waiting for Postgres...' &&
      timeout 60 sh -c 'until pg_isready -h psql -U postgres; do sleep 2; done' &&
      echo 'Postgres is ready!' &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput --no-post-process &&
      python manage.py runserver 0.0.0.0:5000
      "
    volumes:
      - ./code:/app/code
      - ./storage:/app/storage
      - ./config/dev:/app/config:ro
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai_network
    ports:
      - "5000:5000"
    environment:
      <<: *common-variables
      DEBUG: "true"
      APP_CONFIG_FILE: /app/config/project.toml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      <<: *common-logging

  redis:
    image: redis:7.2.4-alpine3.19
    container_name: ai_redis_dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      <<: *common-logging

  psql:
    image: postgres:16-alpine
    container_name: ai_psql_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ai_network
    ports:
      - "5432:5432"  # Expose for local development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      <<: *common-logging

  search:
    image: getmeili/meilisearch:v1.1.1
    container_name: ai_search_dev
    restart: unless-stopped
    volumes:
      - ./storage/ai_search:/meili_data
    networks:
      - ai_network
    ports:
      - "7700:7700"  # Expose for local development
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: dev-master-key-change-in-production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      <<: *common-logging

