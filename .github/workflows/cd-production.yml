name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy'
        required: false
        type: string
      skip_tests:
        description: 'Skip tests (use with extreme caution)'
        required: false
        default: false
        type: boolean

env:
  ENVIRONMENT: production
  DEPLOY_PATH: /app/production

jobs:
  pre-deploy-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "❌ Production deployments only from main branch or manual dispatch"
            exit 1
          fi

      - name: Verify required secrets
        run: |
          REQUIRED_SECRETS=("DEPLOY_KEY" "DEPLOY_HOST" "DEPLOY_USER" "PROD_DB_BACKUP_KEY")
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${{ secrets[$secret] }}" ]; then
              echo "❌ Missing required secret: $secret"
              exit 1
            fi
          done

      - name: Check for breaking changes
        run: |
          echo "🔍 Checking for potential breaking changes..."
          # Add logic to detect breaking changes

  test:
    name: Run Full Test Suite
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, test, security-scan]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.security-scan.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "main-$(git rev-parse --short HEAD)")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=production
            type=raw,value=production-${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=prod-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=production
            VERSION=${{ steps.version.outputs.version }}

  pre-deploy-backup:
    name: Pre-Deployment Backup
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: production

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Create database backup
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd $DEPLOY_PATH
            
            echo "📦 Creating database backup..."
            BACKUP_DIR=".backups/backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            
            # Database backup
            docker compose exec -T psql pg_dump -U postgres ai_db > "$BACKUP_DIR/db_backup.sql" || true
            
            # Configuration backup
            cp -r config "$BACKUP_DIR/" 2>/dev/null || true
            
            echo "✅ Backup created at $BACKUP_DIR"
          EOF

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deploy-backup]
    environment:
      name: production
      url: https://eduaiia.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd $DEPLOY_PATH
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            # Run deployment script
            echo "🚀 Running production deployment..."
            ENVIRONMENT=$ENVIRONMENT bash scripts/deploy.sh
            
            echo "✅ Deployment completed"
          EOF

  smoke-tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add smoke test logic here
          curl -f https://eduaiia.com/health || exit 1
          curl -f https://eduaiia.com/api/health || exit 1

  health-check:
    name: Post-Deployment Health Check
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Run comprehensive health checks
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd $DEPLOY_PATH
            bash scripts/health-check.sh --environment production --comprehensive
          EOF

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy, health-check, smoke-tests]
    if: always()

    steps:
      - name: Notify success
        if: needs.health-check.result == 'success' && needs.smoke-tests.result == 'success'
        run: |
          echo "✅ Production deployment successful"
          # Add notification logic here (Slack, email, PagerDuty, etc.)

      - name: Notify failure
        if: needs.health-check.result == 'failure' || needs.smoke-tests.result == 'failure'
        run: |
          echo "❌ Production deployment failed - Rollback may be required"
          # Add notification logic here (Slack, email, PagerDuty, etc.)
          exit 1

