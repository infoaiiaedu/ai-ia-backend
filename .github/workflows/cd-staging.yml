name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        default: false
        type: boolean

env:
  ENVIRONMENT: staging
  DEPLOY_PATH: /app/staging

jobs:
  pre-deploy-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check branch protection
        run: |
          if [ "${{ github.ref }}" != "refs/heads/staging" ]; then
            echo "❌ This workflow should only run on staging branch"
            exit 1
          fi

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_KEY }}" ] || [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "❌ Missing required deployment secrets"
            exit 1
          fi

  test:
    name: Run Tests
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with: {}

  build:
    name: Build and Tag Image
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=staging
            type=raw,value=staging-{{sha}}
            type=raw,value=staging-{{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=staging

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: staging
      url: https://staging.eduaiia.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            GIT_REPO='https://github.com/infoaiiaedu/ai-ia-backend.git'
            GIT_BRANCH='staging'
            
            # Ensure deployment directory exists
            echo "🔧 Ensuring deployment directory exists..."
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            
            # Bootstrap git repository if needed
            echo "🔧 Checking git repository..."
            NEEDS_CLONE=false
            if [ -d .git ] && git rev-parse --git-dir > /dev/null 2>&1; then
              echo "✓ Git repository found, testing connection..."
              if git fetch origin "$GIT_BRANCH" 2>/dev/null; then
                echo "✓ Repository is valid and accessible"
              else
                echo "⚠ Repository exists but is corrupted, will re-clone..."
                NEEDS_CLONE=true
              fi
            else
              echo "⚠ No valid git repository found, will clone..."
              NEEDS_CLONE=true
            fi
            
            if [ "$NEEDS_CLONE" = true ]; then
              echo "📦 Backing up important directories..."
              BACKUP_DIR=$(mktemp -d)
              for dir in config storage docker logs; do
                if [ -d "$dir" ]; then
                  cp -r "$dir" "$BACKUP_DIR/" 2>/dev/null || true
                  echo "  ✓ Backed up $dir"
                fi
              done
              
              echo "🔧 Fixing directory permissions..."
              chmod -R u+w . 2>/dev/null || true
              
              echo "📦 Removing old files (preserving config, storage, docker, logs)..."
              find . -mindepth 1 -maxdepth 1 ! -name 'config' ! -name 'storage' ! -name 'docker' ! -name '.backups' ! -name 'logs' ! -name '.tmp_repo' -exec rm -rf {} \; 2>/dev/null || true
              rm -rf .tmp_repo .git 2>/dev/null || true
              
              TEMP_CLONE=$(mktemp -d)
              echo "📦 Cloning repository to temporary directory..."
              if git clone -b "$GIT_BRANCH" --single-branch --depth 1 "$GIT_REPO" "$TEMP_CLONE" 2>&1; then
                echo "📦 Moving files to deployment directory..."
                shopt -s dotglob
                find "$TEMP_CLONE" -mindepth 1 -maxdepth 1 ! -name '.git' -exec mv {} . \; 2>/dev/null
                if [ -d "$TEMP_CLONE/.git" ]; then
                  mv "$TEMP_CLONE/.git" . 2>/dev/null || true
                fi
                shopt -u dotglob
                rm -rf "$TEMP_CLONE"
                echo "✓ Repository cloned successfully"
              else
                echo "❌ Failed to clone repository"
                rm -rf "$TEMP_CLONE"
                exit 1
              fi
              
              # Restore backed up directories
              if [ -d "$BACKUP_DIR" ]; then
                echo "📦 Restoring backed up directories..."
                for dir in config storage docker logs; do
                  if [ -d "$BACKUP_DIR/$dir" ]; then
                    if [ -d "$dir" ]; then
                      cp -r "$BACKUP_DIR/$dir"/* "$dir/" 2>/dev/null || true
                    else
                      mv "$BACKUP_DIR/$dir" . 2>/dev/null || true
                    fi
                    echo "  ✓ Restored $dir"
                  fi
                done
                rm -rf "$BACKUP_DIR"
              fi
            fi
            
            # Backup current deployment
            echo "📦 Creating backup..."
            BACKUP_DIR=".backups/backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            cp -r config "$BACKUP_DIR/" 2>/dev/null || true
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin staging
            git reset --hard origin/staging
            
            # Run deployment script
            echo "🚀 Running deployment..."
            ENVIRONMENT=$ENVIRONMENT bash scripts/deploy-modern.sh
            
            echo "✅ Deployment completed"
          EOF

  health-check:
    name: Post-Deployment Health Check
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Run health checks
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd $DEPLOY_PATH
            bash scripts/health-check.sh --environment staging
          EOF

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: always()

    steps:
      - name: Notify success
        if: needs.health-check.result == 'success'
        run: |
          echo "✅ Staging deployment successful"
          # Add notification logic here (Slack, email, etc.)

      - name: Notify failure
        if: needs.health-check.result == 'failure'
        run: |
          echo "❌ Staging deployment failed"
          # Add notification logic here (Slack, email, etc.)
          exit 1

