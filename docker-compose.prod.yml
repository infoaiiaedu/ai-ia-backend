# Production Environment Configuration
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.prod.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/infoaiiaedu/ai-ia-backend:production
    container_name: ai_ia_app_prod
    restart: always
    command: >
      /bin/sh -c "
      set -e &&
      echo 'Creating storage directories...' &&
      mkdir -p /app/storage &&
      echo 'Waiting for Postgres...' &&
      TIMEOUT=60 &&
      ELAPSED=0 &&
      until pg_isready -h psql -U postgres; do
        sleep 2 &&
        ELAPSED=$$((ELAPSED + 2)) &&
        if [ $$ELAPSED -ge $$TIMEOUT ]; then
          echo 'ERROR: PostgreSQL not ready after '$$TIMEOUT's - exiting' &&
          exit 1
        fi &&
        echo 'Waiting... ('$$ELAPSED's/'$$TIMEOUT's)'
      done &&
      echo 'Postgres is ready!' &&
      echo 'Applying migrations...' &&
      python manage.py migrate --noinput &&
      echo 'Collecting static files...' &&
      python manage.py collectstatic --noinput --no-post-process &&
      echo 'Starting Gunicorn...' &&
      exec gunicorn main.wsgi:application --bind 0.0.0.0:5000 --workers 4 --threads 2 --log-level info --access-logfile - --error-logfile - --timeout 120 --keep-alive 5
      "
    volumes:
      - ./code:/app/code
      - ./storage:/app/storage
      - ./config/prod:/app/config:ro
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
      search:
        condition: service_healthy
    networks:
      - ai_network
    ports:
      - "5000:5000"
    environment:
      <<: *common-variables
      DEBUG: "false"
      APP_CONFIG_FILE: /app/config/project.toml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      <<: *common-logging
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp

  redis:
    image: redis:7.2.4-alpine3.19
    container_name: ai_redis_prod
    restart: always
    command: ["redis-server", "/docker/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/docker/redis/redis.conf
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      <<: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  psql:
    image: postgres:16-alpine
    container_name: ai_psql_prod
    restart: always
    environment:
      POSTGRES_DB: ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - ./storage/db/pgdata:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      <<: *common-logging
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  nginx:
    image: nginx:1.25-alpine
    container_name: ai_nginx_prod
    restart: always
    ports:
      - "${PORT:-80}:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./storage:/app/storage:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || wget -q --spider http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      <<: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  search:
    image: getmeili/meilisearch:v1.1.1
    container_name: ai_search_prod
    restart: always
    volumes:
      - ./storage/ai_search:/meili_data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      <<: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  certbot:
    image: certbot/certbot:latest
    container_name: ai_certbot_prod
    restart: always
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet || true; sleep 12h & wait $${!}; done;"
    depends_on:
      - nginx
    networks:
      - ai_network
    logging:
      <<: *common-logging

